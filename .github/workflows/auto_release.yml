name: Auto Release

on:
  push:
    branches:
      - "main"

  workflow_dispatch:

jobs:
  call-workflow:
    name: Building release branch and updating CHANGELOG.md
    uses: renalreg/.github/.github/workflows/auto_release.yml@main
    secrets: inherit
    with:
     release_type: "python"
